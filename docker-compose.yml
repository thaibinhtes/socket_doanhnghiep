# Chạy Redis + Socket cùng nhau (dev local)
# Usage: docker compose up -d --build
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  socket:
    build: .
    container_name: mobi-socket
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      SOCKET_PORT: 3001
      RUNNING_IN_DOCKER: "1"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CHANNEL: mobi:import-events
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
